<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Aggregator</title>
<link rel="icon" type="image/svg+xml" href="/static/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link id="theme-stylesheet" rel="stylesheet" href="/static/aurora.css">
<link rel="stylesheet" href="/static/index.css">
</head>
<body>
<div id="app">
<div class="outlet-selector">
<select class="outlet-select" id="outlet-select" onchange="changeOutlet(this.value)">
<option value="">Loading...</option>
</select>
</div>
<div class="theme-selector">
<div class="tts-container">
<button id="tts-btn" class="tts-btn" onclick="playOrPauseTTS()" title="Text to Speech">
<svg class="tts-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
</svg>
</button>
<div id="tts-menu" class="tts-menu" onclick="event.stopPropagation()">
<div class="tts-progress-container">
<div class="tts-progress-label">
<span id="tts-current-title">Not playing</span>
<span id="tts-time">0:00 / 0:00</span>
</div>
<input type="range" class="tts-progress-bar" id="tts-progress" min="0" max="100" value="0">
</div>
<div class="tts-menu-header">Queue • Click item to play</div>
<div class="tts-queue-list" id="tts-queue-list"></div>
</div>
    </div>
    <div class="theme-container">
        <button id="theme-btn" class="theme-btn" onclick="toggleThemeMenu()">Theme ▾</button>
        <div id="theme-menu" class="theme-menu">
            <button class="theme-option" data-theme="aurora" onclick="setTheme('aurora')">Aurora</button>
            <button class="theme-option" data-theme="sunset" onclick="setTheme('sunset')">Sunset</button>
            <button class="theme-option" data-theme="forest" onclick="setTheme('forest')">Forest</button>
            <button class="theme-option" data-theme="midnight" onclick="setTheme('midnight')">Midnight</button>
            <button class="theme-option" data-theme="neon" onclick="setTheme('neon')">Neon</button>
        </div>
    </div>
    <button id="image-toggle" class="image-toggle-btn" onclick="toggleImages()">
        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
    </button>
    <div id="timer" class="timer"></div>
</div>
<div class="bg-animation">
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
</div>
<div class="grid-lines" id="grid-lines"></div>
<div class="container" id="main-container">
<header><h1 id="header-title">BBC NEWS</h1><div class="subtitle">Latest Headlines</div></header>
<div class="section-nav" id="section-nav"><div class="loading">Loading...</div></div>
<button class="refresh-btn" onclick="loadNews()">REFRESH</button>
<div class="news-grid" id="news-grid"><div class="loading">Loading...</div></div>
<div class="footer">BBC News • Themeable</div>
</div>
</div>
<script src="/static/main.js"></script>
</body>
</html>
