<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<link rel="icon" type="image/svg+xml" href="/static/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link id="theme-stylesheet" rel="stylesheet" href="/static/{{ theme }}.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-overflow-scrolling: touch; }
html, body { height: 100%; overflow-y: auto; overflow-x: hidden; touch-action: pan-y; }
body { background: var(--bg-primary); position: relative; }
.theme-selector { position: fixed; top: 15px; right: 15px; z-index: 100; display: flex; gap: 8px; align-items: flex-start; background: var(--calc-bg); padding: 10px; border-radius: 10px; border: 1px solid var(--calc-border); }
.theme-container { position: relative; }
.theme-btn { background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-primary); padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: 'Orbitron', sans-serif; height: 36px; box-sizing: border-box; display: flex; align-items: center; }
.theme-btn:hover { background: var(--operator-bg); }
.theme-menu { display: none; position: absolute; top: 100%; left: 0; margin-top: 5px; background: var(--calc-bg); border: 1px solid var(--calc-border); border-radius: 8px; overflow: hidden; z-index: 101; }
.theme-menu.open { display: block; }
.theme-option { display: block; width: 100%; padding: 10px 16px; background: transparent; border: none; color: var(--text-primary); font-size: 12px; cursor: pointer; text-align: left; font-family: 'Orbitron', sans-serif; }
.theme-option:hover { background: var(--operator-bg); }
.theme-option.active { background: var(--orb-1); color: var(--bg-primary); }
.image-toggle-btn { background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-primary); padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; height: 36px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
.image-toggle-btn:hover { background: var(--operator-bg); }
.eye-icon { width: 18px; height: 18px; }
.bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; will-change: transform; animation: float 15s infinite ease-in-out; }
.orb-1 { width: 300px; height: 300px; background: var(--orb-1); top: -80px; left: -80px; }
.orb-2 { width: 250px; height: 250px; background: var(--orb-2); bottom: -50px; right: -50px; animation-delay: -5s; }
.orb-3 { width: 200px; height: 200px; background: var(--orb-3); top: 60%; left: 60%; animation-delay: -10s; }
@keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, -30px); } }
.container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 100px 20px 40px; }
.back-btn { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: var(--btn-bg); color: var(--text-primary); border: 1px solid var(--btn-border); border-radius: 8px; text-decoration: none; font-size: 14px; }
.back-btn:hover { background: var(--operator-bg); }
.article-card { background: var(--calc-bg); border: 1px solid var(--calc-border); border-radius: 20px; padding: 30px; }
.article-card img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; }
.article-title { color: var(--text-primary); font-size: 28px; font-weight: 700; margin-bottom: 20px; line-height: 1.3; }
.article-content { color: var(--text-secondary); line-height: 1.8; font-family: 'Roboto', sans-serif; font-size: 16px; }
.article-content p { margin-bottom: 15px; }
.article-content h3 { color: var(--text-primary); font-size: 20px; margin: 25px 0 15px; font-family: 'Orbitron', sans-serif; }
.source-link { display: block; margin-top: 30px; padding: 15px; background: var(--display-bg); border-radius: 10px; text-align: center; }
.source-link a { color: var(--orb-1); text-decoration: none; }
.related-title { color: var(--text-primary); font-size: 20px; margin: 30px 0 20px; text-align: center; }
.related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
.related-card { background: var(--calc-bg); border: 1px solid var(--calc-border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
.related-card:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
.related-card img { width: 100%; height: 120px; object-fit: cover; background: var(--display-bg); }
.related-placeholder { width: 100%; height: 120px; background: var(--display-bg); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 12px; }
.related-content { padding: 12px; }
.related-title-text { color: var(--text-primary); font-size: 14px; line-height: 1.4; }
.tts-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 8px; color: var(--text-primary); font-size: 12px; cursor: pointer; font-family: 'Orbitron', sans-serif; margin-bottom: 15px; }
.tts-btn:hover { background: var(--operator-bg); }
.tts-btn.playing { background: var(--orb-1); color: var(--bg-primary); }
.tts-icon { width: 20px; height: 20px; }
.tts-btn.playing .tts-icon { animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body data-original-url="{{ original_url }}">
<div class="theme-selector">
    <div class="theme-container">
        <button id="theme-btn" class="theme-btn" onclick="toggleThemeMenu()">Theme ▾</button>
        <div id="theme-menu" class="theme-menu">
            <button class="theme-option {{ 'active' if theme=='aurora' else '' }}" data-theme="aurora" onclick="setTheme('aurora')">Aurora</button>
            <button class="theme-option {{ 'active' if theme=='sunset' else '' }}" data-theme="sunset" onclick="setTheme('sunset')">Sunset</button>
            <button class="theme-option {{ 'active' if theme=='forest' else '' }}" data-theme="forest" onclick="setTheme('forest')">Forest</button>
            <button class="theme-option {{ 'active' if theme=='midnight' else '' }}" data-theme="midnight" onclick="setTheme('midnight')">Midnight</button>
            <button class="theme-option {{ 'active' if theme=='neon' else '' }}" data-theme="neon" onclick="setTheme('neon')">Neon</button>
        </div>
    </div>
    <button id="image-toggle" class="image-toggle-btn" onclick="toggleImages()">
        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
    </button>
</div>
<div class="bg-animation">
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
</div>
<div class="container">
<a href="/" class="back-btn">← Back to News</a>
{% if tts_available %}
<button class="tts-btn" id="tts-btn" onclick="toggleTTS()">
    <svg class="tts-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
    </svg>
    <span id="tts-text">Read Aloud</span>
</button>
{% endif %}
<div class="article-card">
{% if image %}<img src="{{ image }}" alt="">{% endif %}
<h1 class="article-title">{{ title }}</h1>
<div class="article-content">{{ content | safe }}</div>
</div>
<h2 class="related-title">Related News</h2>
<div class="related-grid" id="related-grid">
{% for item in related_news %}
<div class="related-card" data-index="{{ loop.index0 }}" onclick="window.location.href='/article?url={{ item.link }}&theme={{ theme }}&source={{ source }}'">
<div class="related-placeholder">Loading...</div>
<div class="related-content">
<div class="related-title-text">{{ item.title }}</div>
</div>
</div>
{% endfor %}
</div>
</div>
<script src="/static/article.js"></script>
</body>
</html>
