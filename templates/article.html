<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<link rel="icon" type="image/svg+xml" href="/static/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link id="theme-stylesheet" rel="stylesheet" href="/static/{{ theme }}.css">
<link rel="stylesheet" href="/static/index.css">
<link rel="stylesheet" href="/static/article.css">
</head>
<body data-original-url="{{ original_url }}">
<div id="app">
<div class="theme-selector">
<div class="tts-container">
<button id="tts-btn" class="tts-btn" onclick="NewsApp.playOrPauseTTS()" title="Text to Speech">
<svg class="tts-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
</svg>
</button>
<div id="tts-menu" class="tts-menu" onclick="event.stopPropagation()">
<div class="tts-progress-container">
<div class="tts-progress-label">
<span id="tts-current-title">Not playing</span>
<span id="tts-time">0:00 / 0:00</span>
</div>
<input type="range" class="tts-progress-bar" id="tts-progress" min="0" max="100" value="0">
</div>
<div class="tts-menu-header">Queue • Click item to play</div>
<div class="tts-queue-list" id="tts-queue-list"></div>
</div>
</div>
<div class="theme-container">
<button id="theme-btn" class="theme-btn" onclick="NewsApp.toggleThemeMenu()">Theme ▾</button>
<div id="theme-menu" class="theme-menu">
<button class="theme-option {{ 'active' if theme=='aurora' else '' }}" data-theme="aurora" onclick="NewsApp.setTheme('aurora')">Aurora</button>
<button class="theme-option {{ 'active' if theme=='sunset' else '' }}" data-theme="sunset" onclick="NewsApp.setTheme('sunset')">Sunset</button>
<button class="theme-option {{ 'active' if theme=='forest' else '' }}" data-theme="forest" onclick="NewsApp.setTheme('forest')">Forest</button>
<button class="theme-option {{ 'active' if theme=='midnight' else '' }}" data-theme="midnight" onclick="NewsApp.setTheme('midnight')">Midnight</button>
<button class="theme-option {{ 'active' if theme=='neon' else '' }}" data-theme="neon" onclick="NewsApp.setTheme('neon')">Neon</button>
</div>
</div>
<button id="image-toggle" class="image-toggle-btn" onclick="NewsApp.toggleImages()">
<svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
</svg>
</button>
<div id="timer" class="timer"></div>
</div>
<div class="bg-animation">
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
</div>
<div class="grid-lines" id="grid-lines"></div>
<div class="container" id="main-container">
<a href="javascript:void(0)" class="back-btn" onclick="NewsApp.showHome()">← Back to News</a>
<div class="article-card">
{% if image %}<img src="{{ image }}" alt="">{% endif %}
<h1 class="article-title">{{ title }}</h1>
<div class="article-content">{{ content | safe }}</div>
</div>
<h2 class="related-title">Related News</h2>
<div class="related-grid" id="related-grid">
{% for item in related_news %}
<div class="related-card" data-index="{{ loop.index0 }}" onclick="window.location.href='/article?url={{ item.link }}&theme={{ theme }}&source={{ source }}'">
{% if item.image %}<img src="{{ item.image }}" alt="">{% else %}<div class="related-placeholder">Loading...</div>{% endif %}
<div class="related-content">
<div class="related-title-text">{{ item.title }}</div>
<button class="queue-btn" onclick="event.stopPropagation(); NewsApp.addToQueue('{{ item.link }}', '{{ source }}', '{{ item.title }}')">+</button>
</div>
</div>
{% endfor %}
</div>
</div>
<script>
(function() {
    'use strict';
    
    window.originalUrl = '{{ original_url }}';
    window.currentSource = '{{ source }}';
    
    const showImages = localStorage.getItem('showImages') !== 'false';
    
    if (!showImages) {
        document.querySelectorAll('img').forEach(img => img.style.display = 'none');
    }
    
    const imageToggle = document.getElementById('image-toggle');
    if (imageToggle) {
        imageToggle.classList.toggle('hidden', !showImages);
    }
    
    const theme = '{{ theme }}';
    const themeStylesheet = document.getElementById('theme-stylesheet');
    if (themeStylesheet) {
        themeStylesheet.href = '/static/' + theme + '.css';
    }
    
    const gridLines = document.getElementById('grid-lines');
    if (gridLines) {
        gridLines.style.display = theme === 'neon' ? 'block' : 'none';
    }
    
    const params = new URLSearchParams(window.location.search);
    const articleUrl = params.get('url') || '{{ original_url }}';
    const articleSource = params.get('source') || '{{ source }}';
    
    if (!showImages) {
        document.querySelectorAll('img').forEach(img => img.style.display = 'none');
    }
    
    const timerEl = document.getElementById('timer');
    if (timerEl) {
        timerEl.textContent = 'Tap + to queue';
    }
    
    function getUrlPath(url) {
        try {
            const parser = document.createElement('a');
            parser.href = url;
            return parser.pathname;
        } catch (e) {
            return '';
        }
    }
    
    function fetchRelatedImages() {
        const cards = document.querySelectorAll('.related-card');
        if (!cards.length) return;
        
        const urls = Array.from(cards).map(card => {
            const onclick = card.getAttribute('onclick');
            if (onclick) {
                const match = onclick.match(/url=([^&']+)/);
                if (match) return decodeURIComponent(match[1]);
            }
            return null;
        }).filter(Boolean);
        
        if (!urls.length) return;
        
        fetch('/api/images?source=' + articleSource + '&' + urls.map(u => 'urls=' + encodeURIComponent(u)).join('&'))
        .then(res => {
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            
            function processChunk() {
                return reader.read().then(({done, value}) => {
                    if (done) {
                        if (buffer.trim()) {
                            try {
                                const imgData = JSON.parse(buffer.trim());
                                updateRelatedCard(imgData);
                            } catch (e) {}
                        }
                        return;
                    }
                    
                    buffer += decoder.decode(value, {stream: true});
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    lines.forEach(line => {
                        if (line.trim()) {
                            try {
                                const imgData = JSON.parse(line.trim());
                                updateRelatedCard(imgData);
                            } catch (e) {}
                        }
                    });
                    
                    return processChunk();
                });
            }
            
            return processChunk();
        })
        .catch(err => console.error('Error fetching related images:', err));
    }
    
    function updateRelatedCard(imgData) {
        if (!imgData.image || !imgData.url) return;
        
        const imgPath = getUrlPath(imgData.url);
        const cards = document.querySelectorAll('.related-card');
        
        cards.forEach(card => {
            const onclick = card.getAttribute('onclick');
            if (onclick) {
                const urlMatch = onclick.match(/url=([^&']+)/);
                if (urlMatch) {
                    const cardPath = getUrlPath(decodeURIComponent(urlMatch[1]));
                    if (cardPath === imgPath) {
                        const placeholder = card.querySelector('.related-placeholder');
                        if (placeholder) {
                            placeholder.outerHTML = '<img src="' + imgData.image + '" alt="" style="width:100%;height:120px;object-fit:cover;background:var(--display-bg);display:' + (showImages ? '' : 'none') + '" onerror="this.style.display=\'none\'">';
                        }
                    }
                }
            }
        });
    }
    
    fetchRelatedImages();
    
})();
</script>
<script src="/static/main.js"></script>
</body>
</html>
